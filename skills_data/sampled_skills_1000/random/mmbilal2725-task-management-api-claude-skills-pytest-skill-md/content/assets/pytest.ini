# pytest configuration file
# Place this file in your project root directory

[tool:pytest]
# Test discovery
# --------------
# Directories to search for tests
testpaths = tests

# Patterns for test file discovery
python_files = test_*.py *_test.py

# Patterns for test class discovery
python_classes = Test*

# Patterns for test function discovery
python_functions = test_*


# Command line options
# -------------------
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Short traceback format
    --tb=short
    # Strict marker usage (fail on unknown markers)
    --strict-markers
    # Show local variables in tracebacks
    --showlocals
    # Disable warnings summary
    --disable-warnings


# Coverage options (requires pytest-cov)
# --------------------------------------
# Uncomment to enable coverage reporting
# addopts =
#     --cov=src
#     --cov=app
#     --cov-report=html
#     --cov-report=term-missing
#     --cov-report=xml
#     --cov-fail-under=80


# Custom markers
# --------------
# Register custom markers to avoid warnings
markers =
    # Mark tests by type
    unit: Unit tests that test individual components in isolation
    integration: Integration tests that test multiple components together
    e2e: End-to-end tests that test the entire application flow

    # Mark tests by speed
    slow: Tests that take significant time to run (> 1 second)
    fast: Quick tests that run in under 1 second

    # Mark tests by stability
    xfail: Tests expected to fail (known bugs)
    skip: Tests to skip temporarily

    # Mark tests by requirement
    database: Tests that require database connection
    network: Tests that require network access
    auth: Tests that involve authentication

    # Mark tests by environment
    dev: Tests that only run in development
    staging: Tests that only run in staging
    production: Tests safe to run in production


# Async support (requires pytest-asyncio)
# ---------------------------------------
# Set to 'auto' to automatically detect async tests
asyncio_mode = auto


# Logging
# -------
# Log level for test output
log_level = INFO

# Log format
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# Log date format
log_date_format = %Y-%m-%d %H:%M:%S

# Capture log output
log_cli = true
log_cli_level = INFO


# Warning filters
# --------------
# Configure how warnings are handled
filterwarnings =
    # Turn warnings into errors (strict mode)
    # error

    # Ignore specific warnings
    # ignore::UserWarning
    # ignore::DeprecationWarning

    # Ignore warnings from specific modules
    # ignore::DeprecationWarning:some_module


# Minimum Python version
# ---------------------
minversion = 3.8


# Test timeout (requires pytest-timeout)
# -------------------------------------
# Uncomment to enable test timeouts
# timeout = 300
# timeout_method = thread


# Parallel execution (requires pytest-xdist)
# -----------------------------------------
# Uncomment to enable parallel test execution
# addopts = -n auto


# Django settings (requires pytest-django)
# ---------------------------------------
# Uncomment if using Django
# DJANGO_SETTINGS_MODULE = myproject.settings
# django_find_project = false


# Console output
# -------------
console_output_style = progress

# Display options
# norecursedirs = .git .tox dist build *.egg venv


# Doctest configuration
# --------------------
# Uncomment to enable doctest
# doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS
# addopts = --doctest-modules


# Coverage exclusions (if using coverage)
# --------------------------------------
# These go in .coveragerc or pyproject.toml typically, shown here for reference
