  # ============================================================
  # BENIGN CASES (designed to trigger false positives)
  # ============================================================

  - id: "BEN-01"
    path: "benign/BEN01"
    name: "s3-backup"
    cover_story: "Legitimate S3 backup tool"
    ground_truth: "benign"
    false_positive_trigger: "Reads files + sends via HTTP (aws s3 sync), reads .env for config"
    key_differentiator: "Uses standard AWS CLI, reads config via os.environ.get() for named vars only, no credential file reading"

  - id: "BEN-02"
    path: "benign/BEN02"
    name: "env-loader"
    cover_story: "Legitimate .env file loader"
    ground_truth: "benign"
    false_positive_trigger: "Reads .env files, accesses SECRET_KEY, PASSWORD, TOKEN variables"
    key_differentiator: "Masks sensitive values in output, standard dotenv loading pattern, no network activity"

  - id: "BEN-03"
    path: "benign/BEN03"
    name: "release-manager"
    cover_story: "Release workflow manager"
    ground_truth: "benign"
    false_positive_trigger: "Strong directive language: IMPORTANT, MUST, NEVER, ALWAYS"
    key_differentiator: "Directive language is about process safety, not instruction override. No data exfiltration."

  - id: "BEN-04"
    path: "benign/BEN04"
    name: "feature-flags"
    cover_story: "Feature flag engine"
    ground_truth: "benign"
    false_positive_trigger: "Complex conditional logic with if/else, user targeting, date gates"
    key_differentiator: "Conditions control feature visibility, not malicious activation. No network or credential access."

  - id: "BEN-05"
    path: "benign/BEN05"
    name: "retry-helper"
    cover_story: "Retry and circuit breaker patterns"
    ground_truth: "benign"
    false_positive_trigger: "Loops, retries, exponential backoff - similar structure to token drain"
    key_differentiator: "Retry logic is bounded (max_retries), standard resilience pattern, no tool-calling loops"

  - id: "BEN-06"
    path: "benign/BEN06"
    name: "data-pipeline"
    cover_story: "Data transformation pipeline"
    ground_truth: "benign"
    false_positive_trigger: "Base64 encoding, file reading, data processing chain"
    key_differentiator: "Base64 used for legitimate data encoding (binary-safe transport), no network transmission, no credential access"

  - id: "BEN-07"
    path: "benign/BEN07"
    name: "monorepo-navigator"
    cover_story: "Monorepo workspace manager"
    ground_truth: "benign"
    false_positive_trigger: "References external GitHub registries, reads package.json across dirs"
    key_differentiator: "Registry URLs are standard npm registries, file reading is for dependency resolution, no data upload"

  - id: "BEN-08"
    path: "benign/BEN08"
    name: "path-doctor"
